name: Build TuitionPro (APK + EXE)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: ./electron

      - name: Build Windows EXE
        run: npm run build:win
        working-directory: ./electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: TuitionPro-Windows-EXE
          path: electron/dist/*.exe
          retention-days: 30

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - uses: android-actions/setup-android@v3

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p android/gradle/wrapper
          curl -fsSL \
            "https://services.gradle.org/distributions/gradle-8.4-bin.zip" \
            -o /tmp/gradle.zip
          unzip -p /tmp/gradle.zip "*/lib/gradle-wrapper.jar" > \
            android/gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          wget -q \
            "https://raw.githubusercontent.com/nicowillis/gradle-wrapper/main/gradle-wrapper.jar" \
            -O android/gradle/wrapper/gradle-wrapper.jar || true

      - name: Setup Gradle wrapper via Gradle action
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: ./android

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/TuitionPro.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TuitionPro-Android-APK
          path: android/app/build/outputs/apk/debug/TuitionPro.apk
          retention-days: 30

  release:
    name: Publish Release
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: TuitionPro-Windows-EXE
          path: ./release

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: TuitionPro-Android-APK
          path: ./release

      - name: Rename EXE nicely
        run: |
          cd release
          for f in *.exe; do mv "$f" "TuitionPro-Setup-Windows.exe" 2>/dev/null || true; done
          ls -lh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "TuitionPro v1.0.${{ github.run_number }}"
          body: |
            ## TuitionPro — Download & Install

            | Platform | File | Instructions |
            |----------|------|-------------|
            | **Android** | `TuitionPro.apk` | Download → tap to install. Enable *Install unknown apps* in Settings first. |
            | **Windows** | `TuitionPro-Setup-Windows.exe` | Download → double-click → Install. |

            ### Features
            - Manage students Classes 1–12 (CBSE & State syllabus)
            - ₹1,000/month default fee per student
            - Access auto-disabled when fee is overdue
            - Works fully offline — data saved on your device
            - Dark mode support
          files: |
            release/TuitionPro.apk
            release/TuitionPro-Setup-Windows.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
